<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>PetCare Hub — Вход</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			background-color: #f5f7fa;
			color: #333;
			display: flex;
			flex-direction: column;
			min-height: 100vh;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 20px;
			width: 100%;
		}

		header {
			padding: 20px 0;
			text-align: center;
		}

		.logo {
			font-size: 24px;
			font-weight: bold;
			color: #5a6c7d;
			text-decoration: none;
		}

		.login-wrapper {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 40px 20px;
		}

		.login-card {
			background: white;
			width: 100%;
			max-width: 400px;
			padding: 40px;
			border-radius: 20px;
			box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
			text-align: center;
		}

		.login-title {
			font-size: 28px;
			margin-bottom: 10px;
			color: #333;
		}

		.login-subtitle {
			color: #666;
			margin-bottom: 30px;
			font-size: 14px;
		}

		.form-group {
			margin-bottom: 20px;
			text-align: left;
		}

		.form-label {
			display: block;
			margin-bottom: 8px;
			font-size: 14px;
			color: #555;
			font-weight: 500;
		}

		.form-input {
			width: 100%;
			padding: 12px 16px;
			border: 1px solid #ddd;
			border-radius: 10px;
			font-size: 16px;
			transition: border-color 0.3s, box-shadow 0.3s;
			outline: none;
		}

		.form-input:focus {
			border-color: #ff8c6b;
			box-shadow: 0 0 0 3px rgba(255, 140, 107, 0.2);
		}

		.password-wrapper {
			position: relative;
		}

		.toggle-password {
			position: absolute;
			right: 15px;
			top: 50%;
			transform: translateY(-50%);
			cursor: pointer;
			color: #999;
			font-size: 18px;
			user-select: none;
		}

		.form-options {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 25px;
			font-size: 14px;
		}

		.remember-me {
			display: flex;
			align-items: center;
			gap: 8px;
			color: #666;
			cursor: pointer;
		}

		.forgot-password {
			color: #ff8c6b;
			text-decoration: none;
			font-weight: 500;
		}

		.forgot-password:hover {
			text-decoration: underline;
		}

		.submit-btn {
			width: 100%;
			padding: 14px;
			background: #ff8c6b;
			color: white;
			border: none;
			border-radius: 12px;
			font-size: 16px;
			font-weight: bold;
			cursor: pointer;
			transition: background 0.3s, transform 0.2s;
		}

		.submit-btn:hover {
			background: #ff7a52;
			transform: translateY(-2px);
		}

		.divider {
			margin: 30px 0;
			position: relative;
			text-align: center;
		}

		.divider::before {
			content: '';
			position: absolute;
			top: 50%;
			left: 0;
			right: 0;
			height: 1px;
			background: #eee;
		}

		.divider span {
			background: white;
			padding: 0 10px;
			color: #999;
			font-size: 14px;
			position: relative;
		}

		.social-login {
			display: flex;
			gap: 15px;
			justify-content: center;
		}

		.social-btn {
			width: 50px;
			height: 50px;
			border-radius: 12px;
			border: 1px solid #eee;
			background: white;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: background 0.2s;
			font-size: 20px;
		}

		.social-btn:hover {
			background: #f9f9f9;
			border-color: #ddd;
		}

		.signup-link {
			margin-top: 30px;
			font-size: 14px;
			color: #666;
		}

		.signup-link a {
			color: #ff8c6b;
			text-decoration: none;
			font-weight: bold;
		}

		.signup-link a:hover {
			text-decoration: underline;
		}

		footer {
			text-align: center;
			padding: 20px 0;
			color: #999;
			font-size: 14px;
		}
	</style>
</head>

<body>
	<header class="container">
		<a href="/" class="logo">PetCare Hub</a>
	</header>

	<div class="login-wrapper">
		<div class="login-card">
			<h2 class="login-title">Добро пожаловать!</h2>
			<p class="login-subtitle">Войдите, чтобы управлять здоровьем питомца</p>

			<form action="#" method="POST">
				<div class="form-group">
					<label for="login" class="form-label">Логин</label>
					<input type="text" id="login" class="form-input" placeholder="Ваш логин" required
						autocomplete="username">
				</div>

				<div class="form-group">
					<label for="password" class="form-label">Пароль</label>
					<div class="password-wrapper">
						<input type="password" id="password" class="form-input" placeholder="••••••••" required>
						<span class="toggle-password" onclick="togglePassword()">👁️</span>
					</div>
				</div>

				<div class="form-options">
					<label class="remember-me">
						<input type="checkbox"> Запомнить меня
					</label>
					<a href="#" class="forgot-password">Забыли пароль?</a>
				</div>

				<button type="submit" class="submit-btn">Войти</button>
			</form>

			<div class="signup-link">
				Нет аккаунта? <a href="#">Зарегистрироваться</a>
			</div>
		</div>
	</div>

	<footer class="container">
		© 2026 PetCare Hub. Все права защищены.
	</footer>

	<script>
		function togglePassword() {
			const passwordInput = document.getElementById('password');
			const toggleIcon = document.querySelector('.toggle-password');

			if (passwordInput.type === 'password') {
				passwordInput.type = 'text';
				toggleIcon.textContent = '🙈';
			} else {
				passwordInput.type = 'password';
				toggleIcon.textContent = '👁️';
			}
		}
	</script>

	<script>
		document.querySelector('form').addEventListener('submit', async function (event) {
			event.preventDefault();

			const login = document.getElementById('login').value;
			const password = document.getElementById('password').value;
			const submitBtn = document.querySelector('.submit-btn');

			submitBtn.disabled = true;
			submitBtn.textContent = 'Входим...';

			try {
				const body = new URLSearchParams();
				body.set('username', login);
				body.set('password', password);
				const response = await fetch('/api/proxy/token', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/x-www-form-urlencoded'
					},
					body: body.toString()
				});

				const data = await response.json();

				if (response.ok) {
					localStorage.setItem('authToken', data.access_token);
					window.location.href = '/';
				} else {
					const msg = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail || data);
					alert('Ошибка: ' + (msg || 'Неверный логин или пароль'));
				}
			} catch (error) {
				console.error('Ошибка сети:', error);
				alert('Произошла ошибка соединения. Попробуйте позже.');
			} finally {
				submitBtn.disabled = false;
				submitBtn.textContent = 'Войти';
			}
		});
	</script>

</body>

</html>
